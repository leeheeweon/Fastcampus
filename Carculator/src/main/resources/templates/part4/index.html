<!DOCTYPE html>
<html xmlns:th="www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>주식투자 포트폴리오</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/par4/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-md navbar-dark fixed-top bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">이희원의 홈페이지</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse"
                aria-controls="navbarCollapse" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarCollapse">
            <ul class="navbar-nav me-auto mb-2 mb-md-0">
                <li class="nav-item">
                    <a class="nav-link" aria-current="page" th:href="@{/}">홈</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/part1/index}">사칙연산 계산기</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/part2/index}">대출이자 계산기</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/part3/index}">일기장</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/part4/index}">주식투자 포트폴리오</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
<main class="container" style="margin-top: 10%;">
    <h1>주식투자 포트폴리오</h1>

    <div class="row">
        <div class="col">
            <ul class="list-group">
                <li class="list-group-item">총 보유자산 <b id="total">0</b> 원</li>
                <li class="list-group-item">총 보유현금 <b id="cash">0</b> 원</li>
                <li class="list-group-item">총 보유주식 <b id="stocks-price">0</b> 원</li>
                <li class="list-group-item">평가손익 <b id="profit">0</b> 원</li>
                <li class="list-group-item">수익률 <b id="percentage">0</b> %</li>
            </ul>
        </div>
        <div class="col" style="height: 400px;">
            <div id="chartContainer"></div>
        </div>
    </div>

    <input type="text" class=form-control id="search" placeholder="검색" />
    <table class="table table-striped table-hover">
        <thead>
        <tr>
            <th scope="col">시간</th>
            <th scope="col">종목</th>
            <th scope="col">거래</th>
            <th scope="col">평단가</th>
            <th scope="col">수량</th>
            <th scope="col">평가금액</th>
        </tr>
        </thead>
        <tbody id="trade-history">
        <tr>
            <th scope="row">2022-11-17 12:00:00</th>
            <td>삼성전자</td>
            <td>매도</td>
            <td>10,000</td>
            <td>2</td>
            <td>20,000</td>
        </tr>
        </tbody>
    </table>

    <div class="alert alert-danger" role="alert" id="alert" style="display: none;">
        A simple danger alert—check it out!
    </div>

    <div class="input-group">
        <input type="datetime-local" id="datetime" class="form-control"/>

        <select id="event" class="form-select">
            <option value="삼성전자">삼성전자</option>
            <option value="아마존">아마존</option>
            <option value="애플">애플</option>
        </select>

        <input type="text" id="price" placeholder="평단가" class="form-control"/>
        <input type="text" id="amount" placeholder="수량" class="form-control"/>

        <button type="button" id="buy" class="btn btn-success">매수</button>
        <button type="button" id="sell" class="btn btn-danger">매도</button>
    </div>
</main>

<script src="https://code.jquery.com/jquery-3.6.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/part4/jquery.timeago.js}"></script>
<script th:src="@{/js/part4/jquery.timeago.ko.js}"></script>
<script src="https://canvasjs.com/assets/script/jquery.canvasjs.min.js"></script>
<script th:src="@{/js/part4/script.js}"></script>
</body>
</html>
